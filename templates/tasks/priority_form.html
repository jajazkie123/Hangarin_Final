{% extends 'tasks/base.html' %}
{% block title %}{{ action }} Priority{% endblock %}
{% block page_title %}{{ action }} Priority{% endblock %}
{% block topbar_actions %}
<a href="{% url 'priority_list' %}" class="btn btn-outline-secondary btn-sm"><i class="fa-solid fa-arrow-left"></i> Back</a>
{% endblock %}
{% block content %}
<div style="max-width: 440px;">
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white fw-semibold border-bottom">{{ action }} Priority</div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-medium" style="font-size:13px;">Priority Name <span class="text-danger">*</span></label>
                    {{ form.name }}
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary btn-sm"><i class="fa-solid fa-floppy-disk"></i> Save</button>
                    <a href="{% url 'priority_list' %}" class="btn btn-outline-secondary btn-sm">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
